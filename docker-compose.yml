services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lottery-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/lottery_db
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      APP_ADMIN_EMAIL: admin@lottery.local
      APP_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: lottery-postgres
    environment:
      POSTGRES_DB: lottery_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lottery_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_data:
